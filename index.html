<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu de Navegação</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e1e2f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Container do menu */
    .menu {
      background: #2e2e40;
      padding: 20px;
      border-radius: 12px;
    }

    /* Lista */
    .menu ul {
      list-style: none;
      display: flex;
      gap: 15px;
      padding: 0;
      margin: 0;
    }

    /* Itens */
    .menu ul li {
    }

    /* Links */
    .menu ul li a {
      text-decoration: none;
      color: white;
      background: #444;
      padding: 12px 18px;
      border-radius: 8px;
      transition: 0.3s;
    }

    /* Hover individual */
    .menu ul li a:hover {
      background: #00ff88;
      color: #000;
    }

    /* Combinador: afeta todos quando passa no UL */
    .menu ul:hover li a {
      opacity: 0.5;
    }

    /* Destaca apenas o ativo */
    .menu ul li a:hover {
      opacity: 1;
      transform: scale(1.1);
    }

  </style>
</head>

<body>

  <nav class="menu">
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Sobre</a></li>
      <li><a href="#">Serviços</a></li>
      <li><a href="#">Projetos</a></li>
      <li><a href="#">Contato</a></li>
    </ul>
  </nav>

</body>
</html>
